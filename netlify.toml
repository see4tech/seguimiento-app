[build]
  command   = "npm run build"
  publish   = "frontend/dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

# Redirige /api/* a la Netlify Function
[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/api/:splat"
  status = 200
  force  = true

# SPA fallback — todas las rutas al index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
